services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: tutormatch
      DB_USERNAME: tutormatch
      DB_PASSWORD: change-me
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  queue:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: tutormatch
      DB_USERNAME: tutormatch
      DB_PASSWORD: change-me
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=60"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tutormatch
      POSTGRES_USER: tutormatch
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutormatch -d tutormatch"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  caddy_config:
  caddy_data:
  postgres_data:
